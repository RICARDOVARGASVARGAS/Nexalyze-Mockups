      <!-- ═══ ESTADO 3 — Datos extraídos (vista principal) ═══ -->

      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-3 items-start">
        <div class="lg:col-span-8 space-y-3">
          <article class="theme-surface rd-card p-4 space-y-4">
            <h2 class="table-panel-title">Datos del gasto <span class="badge-ia">✨ IA SCAN</span></h2>
            <div>
              <label class="rd-label block mb-1">Proveedor * <span class="badge-ia ml-1">✨ IA</span></label>
              <input type="text" class="rd-input w-full h-10 px-3 text-sm uppercase" value="PETROPERÚ S.A.A.">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>

                <input type="date" class="rd-input w-full h-10 px-3 text-sm" value="2026-04-25">
              </div>
              <div>
                <label class="rd-label block mb-1">Monto * <span class="badge-ia">✨ IA</span></label>
                <div class="flex items-center gap-2"><span class="font-bold">S/</span><input type="number" step="0.01" class="rd-input w-full h-10 px-3 text-sm" value="80.00"></div>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label class="rd-label block mb-1">Política *</label>
                <select class="rd-select w-full h-10 px-3 text-sm uppercase">

              <div>
                <label class="rd-label block mb-1">Moneda</label>

              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>

                <select class="rd-select w-full h-10 px-3 text-sm uppercase"><option selected>Factura</option></select>
              </div>
              <div>
                <label class="rd-label block mb-1">Número <span class="badge-ia">✨ IA</span></label>

              </div>
            </div>
            <div>
              <label class="rd-label block mb-1">RUC proveedor <span class="badge-ia">✨ IA</span></label>
              <input type="text" class="rd-input w-full h-10 px-3 text-sm border-2 border-warning rd-input" value="20100070970">
              <p class="text-xs text-warning mt-1 font-medium">Por favor verifica este dato</p>
            </div>
            <div>
              <label class="rd-label block mb-1">Categoría</label>
              <select class="rd-select w-full h-10 px-3 text-sm uppercase"><option selected>Combustible</option></select>
            </div>
            <label class="flex items-center justify-between rounded-lg border border-border px-3 py-3 bg-primary-light/30">
              <div>

  <script>
    function collapseOtherSidebarGroups() {
      ['aprobador', 'administrador'].forEach((g) => {
        const items = document.querySelector(`[data-group="${g}"] .group-items`);
        const icon = document.querySelector(`[data-group="${g}"] .group-icon`);
        if (items) items.classList.add('hidden');
        if (icon) icon.classList.remove('rotate-90');
      });
      const rItems = document.querySelector('[data-group="rendidor"] .group-items');
      const rIcon = document.querySelector('[data-group="rendidor"] .group-icon');
      if (rItems) rItems.classList.remove('hidden');
      if (rIcon) rIcon.classList.add('rotate-90');
    }
    document.getElementById('currScan').addEventListener('change', (e) => {
      document.getElementById('prefImpScan').textContent = e.target.value;
    });
    document.getElementById('toggleImpScan').addEventListener('change', (e) => {
      document.getElementById('bloqueImpScan').classList.toggle('hidden', !e.target.checked);
    });

    initLayout('MIS GASTOS / NUEVO GASTO SCAN', '../components').then(() => {
      collapseOtherSidebarGroups();
      if (window.lucide) lucide.createIcons();
    });
  </script>
